<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maths Proxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:      #08080f;
      --chrome:  #0e0e1c;
      --surface: #131325;
      --card:    #191930;
      --border:  #22223a;
      --border2: #2e2e50;
      --accent:  #e94560;
      --blue:    #4b8ef0;
      --green:   #00cfa8;
      --yellow:  #f0a030;
      --text:    #eeeef8;
      --sub:     #8888aa;
      --muted:   #44445a;
      --tab-h:   36px;
      --bar-h:   46px;
      --r:       8px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── CHROME (top browser UI) ── */
    #chrome {
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    /* Tab bar */
    #tab-bar {
      display: flex;
      align-items: flex-end;
      padding: 8px 8px 0;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      min-height: calc(var(--tab-h) + 8px);
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px 0 12px;
      height: var(--tab-h);
      min-width: 140px;
      max-width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 7px 7px 0 0;
      cursor: pointer;
      font-size: 12px;
      color: var(--sub);
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      position: relative;
    }
    .tab:hover { background: var(--card); color: var(--text); }
    .tab.active {
      background: var(--bg);
      color: var(--text);
      border-color: var(--border2);
      z-index: 2;
    }
    .tab-favicon {
      width: 14px; height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .tab-close {
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
      flex-shrink: 0;
      color: var(--sub);
    }
    .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
    .tab-close:hover { background: rgba(233,69,96,0.25); color: var(--accent); }

    #new-tab-btn {
      width: 28px; height: var(--tab-h);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      font-size: 18px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    #new-tab-btn:hover { color: var(--text); background: var(--surface); }

    /* Nav bar */
    #nav-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      height: var(--bar-h);
    }

    .nav-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface); color: var(--text); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* URL bar */
    #url-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }
    #url-icon {
      position: absolute;
      left: 10px;
      font-size: 13px;
      color: var(--green);
      pointer-events: none;
    }
    #url-input {
      width: 100%;
      height: 32px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 0 36px 0 30px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #url-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(75,142,240,0.15);
      background: var(--card);
    }
    #url-go {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      transition: color 0.15s;
    }
    #url-go:hover { color: var(--blue); }

    /* Bookmark btn */
    #bookmark-btn {
      font-size: 16px;
      transition: color 0.2s, transform 0.15s;
    }
    #bookmark-btn.bookmarked { color: var(--yellow); }
    #bookmark-btn:hover { transform: scale(1.2); }

    /* User / auth */
    #auth-area { display: flex; align-items: center; gap: 6px; }
    .hdr-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--sub);
      transition: all 0.15s;
    }
    .hdr-btn:hover { border-color: var(--blue); color: var(--text); }
    .hdr-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .hdr-btn.primary:hover { background: #ff2d4e; }

    .user-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 3px 10px 3px 4px;
      cursor: pointer;
      font-size: 12px;
      color: var(--sub);
      transition: border-color 0.15s;
    }
    .user-pill:hover { border-color: var(--accent); }
    .u-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
    }

    /* ── CONTENT AREA ── */
    #content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-page {
      display: none;
      width: 100%; height: 100%;
      flex-direction: column;
    }
    .tab-page.active { display: flex; }

    /* New tab / home page */
    .home-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg);
    }

    /* Grid BG */
    .home-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(75,142,240,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(75,142,240,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .logo-wrap { margin-bottom: 28px; text-align: center; }
    .logo-big {
      font-size: clamp(42px, 8vw, 68px);
      font-weight: 600;
      letter-spacing: -2px;
      line-height: 1;
    }
    .logo-big .m { color: #4b8ef0; }
    .logo-big .a { color: #e94560; }
    .logo-big .t { color: #f0a030; }
    .logo-big .h { color: #4b8ef0; }
    .logo-big .s { color: #00cfa8; }
    .logo-big .sp { display: inline-block; width: 14px; }
    .logo-big .p { color: #e94560; }
    .logo-big .r { color: #f0a030; }
    .logo-big .o { color: #4b8ef0; }
    .logo-big .x { color: #00cfa8; }
    .logo-big .y { color: #e94560; }
    .logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* Home search */
    .home-search-wrap {
      width: 100%; max-width: 560px;
      position: relative;
      margin-bottom: 14px;
    }
    .home-search {
      width: 100%;
      padding: 13px 50px 13px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: 26px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .home-search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(233,69,96,0.1), 0 8px 32px rgba(0,0,0,0.35);
    }
    .home-search::placeholder { color: var(--muted); }
    .home-search-go {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: white;
      transition: background 0.2s, transform 0.15s;
    }
    .home-search-go:hover { background: #ff2d4e; transform: translateY(-50%) scale(1.08); }

    .home-btns { display: flex; gap: 8px; }
    .home-btn {
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--sub);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .home-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Quick links */
    .quick-links {
      display: flex; gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 28px;
      max-width: 560px;
    }
    .quick-link {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      width: 72px;
      cursor: pointer;
      padding: 10px 6px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .quick-link:hover { background: var(--surface); }
    .quick-link-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .quick-link span { font-size: 11px; color: var(--sub); }

    /* ── RESULTS PAGE ── */
    .results-page {
      display: none;
      flex-direction: column;
      width: 100%; height: 100%;
      overflow-y: auto;
      background: var(--bg);
    }
    .results-page.visible { display: flex; }

    .results-body { padding: 20px 24px 60px; max-width: 720px; }

    .results-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .result-card {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      animation: slideUp 0.25s ease both;
    }
    .result-card:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .result-domain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--green);
      margin-bottom: 3px;
    }
    .result-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--blue);
      margin-bottom: 5px;
      line-height: 1.35;
    }
    .result-snippet { font-size: 13px; color: var(--sub); line-height: 1.6; }

    /* ── PROXY IFRAME PAGE ── */
    .proxy-page {
      display: none;
      flex-direction: column;
      width: 100%; height: 100%;
    }
    .proxy-page.visible { display: flex; }

    .proxy-loading {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }
    .proxy-loading.visible { display: flex; }

    .load-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    .load-url { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .proxy-frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .proxy-frame {
      width: 100%; height: 100%;
      border: none;
      background: white;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Spinner in results */
    .search-spinner {
      display: none;
      width: 28px; height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 60px auto;
    }

    /* ── BOOKMARKS PANEL ── */
    #bookmarks-panel {
      display: none;
      position: fixed;
      top: 0; right: 0;
      width: 300px; height: 100%;
      background: var(--chrome);
      border-left: 1px solid var(--border2);
      z-index: 100;
      flex-direction: column;
      animation: slideIn 0.2s ease;
    }
    #bookmarks-panel.open { display: flex; }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600;
    }
    .panel-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; transition: color 0.15s; }
    .panel-close:hover { color: var(--text); }
    .bookmarks-list { flex: 1; overflow-y: auto; padding: 8px; }
    .bookmark-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
    }
    .bookmark-item:hover { background: var(--surface); }
    .bookmark-item .bm-icon { font-size: 14px; flex-shrink: 0; }
    .bookmark-item .bm-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .bookmark-item .bm-del { opacity: 0; color: var(--muted); cursor: pointer; font-size: 14px; transition: opacity 0.15s, color 0.15s; flex-shrink: 0; }
    .bookmark-item:hover .bm-del { opacity: 1; }
    .bookmark-item .bm-del:hover { color: var(--accent); }
    .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── HISTORY PANEL ── */
    #history-panel {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 300px; height: 100%;
      background: var(--chrome);
      border-right: 1px solid var(--border2);
      z-index: 100;
      flex-direction: column;
      animation: slideInLeft 0.2s ease;
    }
    #history-panel.open { display: flex; }
    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%; max-width: 380px;
      position: relative;
      animation: popIn 0.2s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(0.94) translateY(8px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .modal-close { position: absolute; top:14px; right:14px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; transition: color 0.15s; }
    .modal-close:hover { color: var(--text); }
    .modal-logo { text-align:center; font-size:28px; font-weight:600; letter-spacing:-1px; margin-bottom:4px; }
    .modal-logo .m{color:#4b8ef0} .modal-logo .a{color:#e94560} .modal-logo .t{color:#f0a030} .modal-logo .h{color:#4b8ef0} .modal-logo .s{color:#00cfa8}
    .modal-tagline { text-align:center; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:24px; }
    .tab-bar-modal { display:flex; background:var(--card); border-radius:8px; padding:3px; margin-bottom:20px; gap:3px; }
    .modal-tab { flex:1; padding:7px; text-align:center; font-size:12px; font-weight:600; cursor:pointer; background:none; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; border-radius:6px; transition:all 0.15s; }
    .modal-tab.active { background:var(--accent); color:white; }
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:11px; font-weight:600; color:var(--sub); margin-bottom:5px; letter-spacing:0.5px; text-transform:uppercase; font-family:'JetBrains Mono',monospace; }
    .form-input { width:100%; padding:10px 12px; background:var(--card); border:1.5px solid var(--border2); border-radius:7px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; transition:border-color 0.2s; }
    .form-input:focus { border-color:var(--accent); }
    .form-input::placeholder { color:var(--muted); }
    .btn-full { width:100%; padding:11px; background:var(--accent); border:none; border-radius:7px; color:white; font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:4px; transition:all 0.15s; }
    .btn-full:hover { background:#ff2d4e; transform:translateY(-1px); box-shadow:0 6px 18px rgba(233,69,96,0.3); }
    .btn-full:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .auth-msg { margin-top:12px; padding:9px 12px; border-radius:6px; font-size:12px; text-align:center; display:none; }
    .auth-msg.error { background:rgba(233,69,96,0.1); border:1px solid rgba(233,69,96,0.25); color:#ff6b7a; display:block; }
    .auth-msg.success { background:rgba(0,207,168,0.08); border:1px solid rgba(0,207,168,0.25); color:var(--green); display:block; }

    /* Progress bar */
    #progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--accent);
      z-index: 999;
      width: 0%;
      transition: width 0.3s, opacity 0.3s;
      opacity: 0;
    }
    #progress.loading { opacity: 1; animation: progress-anim 1.5s ease infinite; }
    @keyframes progress-anim {
      0%   { width: 0%; }
      50%  { width: 70%; }
      100% { width: 90%; }
    }
    #progress.done { width: 100%; opacity: 0; transition: width 0.1s, opacity 0.5s 0.1s; }
  </style>
</head>
<body>

<div id="progress"></div>

<!-- ══════ AUTH MODAL ══════ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-logo"><span class="m">M</span><span class="a">a</span><span class="t">t</span><span class="h">h</span><span class="s">s</span></div>
    <div class="modal-tagline">private · fast · unrestricted</div>
    <div class="tab-bar-modal">
      <button class="modal-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    </div>
    <div id="formLogin">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn-full" id="loginBtn" onclick="doLogin()">Sign In  With Your Maths Support Account →</button>
      <div class="auth-msg" id="loginMsg"></div>
    </div>
    <div id="formReg" style="display:none">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="regEmail" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="regPass" placeholder="Min. 6 characters"/></div>
      <div class="form-group"><label class="form-label">Confirm</label><input class="form-input" type="password" id="regConf" placeholder="Repeat password"/></div>
      <button class="btn-full" id="regBtn" onclick="doRegister()">Create Account →</button>
      <div class="auth-msg" id="regMsg"></div>
    </div>
  </div>
</div>

<!-- ══════ BOOKMARKS PANEL ══════ -->
<div id="bookmarks-panel">
  <div class="panel-header">
    <span>⭐ Bookmarks</span>
    <button class="panel-close" onclick="toggleBookmarks()">✕</button>
  </div>
  <div class="bookmarks-list" id="bookmarks-list">
    <div class="empty-state">No bookmarks yet.<br>Click ☆ to save a page.</div>
  </div>
</div>

<!-- ══════ HISTORY PANEL ══════ -->
<div id="history-panel">
  <div class="panel-header">
    <span>🕐 History</span>
    <button class="panel-close" onclick="toggleHistory()">✕</button>
  </div>
  <div class="bookmarks-list" id="history-list">
    <div class="empty-state">No history yet.</div>
  </div>
</div>

<!-- ══════ CHROME ══════ -->
<div id="chrome">
  <!-- Tab bar -->
  <div id="tab-bar">
    <!-- tabs injected here -->
    <div id="new-tab-btn" onclick="newTab()" title="New tab">+</div>
  </div>

  <!-- Nav bar -->
  <div id="nav-bar">
    <button class="nav-btn" id="btn-back" onclick="goBack()" title="Back" disabled>&#8592;</button>
    <button class="nav-btn" id="btn-fwd" onclick="goFwd()" title="Forward" disabled>&#8594;</button>
    <button class="nav-btn" id="btn-reload" onclick="reloadTab()" title="Reload">&#8635;</button>
    <button class="nav-btn" onclick="goHome()" title="Home">⌂</button>

    <div id="url-wrap">
      <span id="url-icon">🔒</span>
      <input id="url-input" type="text" placeholder="Search or enter URL..." spellcheck="false"
        onkeydown="if(event.key==='Enter') navigate(this.value)"
        onfocus="this.select()"/>
      <button id="url-go" onclick="navigate(document.getElementById('url-input').value)">↵</button>
    </div>

    <button class="nav-btn" id="bookmark-btn" onclick="toggleBookmark()" title="Bookmark">☆</button>
    <button class="nav-btn" onclick="toggleHistory()" title="History">🕐</button>
    <button class="nav-btn" onclick="toggleBookmarks()" title="Bookmarks">⭐</button>

    <div id="auth-area">
      <button class="hdr-btn" onclick="openModal()">Sign In</button>
      <button class="hdr-btn primary" onclick="openModal(); switchTab('register')">Register</button>
    </div>
  </div>
</div>

<!-- ══════ CONTENT AREA ══════ -->
<div id="content-area"></div>

// ── Tabs engine ────────────────────────────────────────────
let tabs = [];
let activeTabId = null;
let tabIdCounter = 0;

function genId() { return ++tabIdCounter; }

function newTab(url) {
  const id = genId();
  const tab = {
    id,
    title: 'Maths Proxy',
    favicon: '🔒',
    url: url || '',
    type: 'home',
    history: [],
    historyIdx: -1,
  };
  tabs.push(tab);
  renderTabBar();
  activateTab(id);
  if (url) navigateTab(id, url);
  return id;
}

function closeTab(id, e) {
  e && e.stopPropagation();
  const idx = tabs.findIndex(t=>t.id===id);
  tabs = tabs.filter(t=>t.id!==id);

  // Remove page element
  const el = document.getElementById('page-'+id);
  if (el) el.remove();

  if (tabs.length === 0) { newTab(); return; }

  // Activate adjacent tab
  const nextIdx = Math.min(idx, tabs.length-1);
  activateTab(tabs[nextIdx].id);
}

function activateTab(id) {
  activeTabId = id;
  // Hide all pages, show current
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-'+id);
  if (page) page.classList.add('active');
  renderTabBar();
  syncNavBar();
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  // Remove existing tab elements
  bar.querySelectorAll('.tab').forEach(el => el.remove());

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.id = 'tab-el-'+tab.id;
    el.innerHTML = `
      <span class="tab-favicon">${tab.favicon}</span>
      <span class="tab-title">${esc(tab.title)}</span>
      <span class="tab-close" onclick="closeTab(${tab.id},event)">✕</span>
    `;
    el.addEventListener('click', () => activateTab(tab.id));
    bar.insertBefore(el, document.getElementById('new-tab-btn'));
  });
}

function getActiveTab() { return tabs.find(t=>t.id===activeTabId); }

function syncNavBar() {
  const tab = getActiveTab();
  if (!tab) return;

  document.getElementById('url-input').value = tab.url || '';
  document.getElementById('btn-back').disabled = tab.historyIdx <= 0;
  document.getElementById('btn-fwd').disabled = tab.historyIdx >= tab.history.length - 1;

  // Bookmark button
  const bms = getBookmarks();
  const isBookmarked = bms.some(b => b.url === tab.url);
  const bbtn = document.getElementById('bookmark-btn');
  bbtn.textContent = isBookmarked ? '★' : '☆';
  bbtn.classList.toggle('bookmarked', isBookmarked);
}

// ── Navigation ─────────────────────────────────────────────
function navigate(input) {
  if (!input.trim()) return;
  const tab = getActiveTab();
  if (!tab) return;

  // Determine if URL or search query
  let url = input.trim();
  if (!url.startsWith('http') && !url.includes('.')) {
    // It's a search query
    doSearch(url);
    return;
  }
  if (!url.startsWith('http')) url = 'https://' + url;
  navigateTab(tab.id, url);
}

function navigateTab(id, url) {
  const tab = tabs.find(t=>t.id===id);
  if (!tab) return;

  tab.url = url;
  tab.type = 'proxy';

  // Push to tab history
  if (tab.history[tab.historyIdx] !== url) {
    tab.history = tab.history.slice(0, tab.historyIdx + 1);
    tab.history.push(url);
    tab.historyIdx = tab.history.length - 1;
  }

  addToHistory(url, tab.title);

  // Get or create page
  let page = document.getElementById('page-'+id);
  if (!page) {
    page = createTabPage(id);
  }

  // Show proxy view
  showProxyPage(id, url);
  if (id === activeTabId) syncNavBar();
}

function createTabPage(id) {
  const page = document.createElement('div');
  page.className = 'tab-page';
  page.id = 'page-'+id;
  page.innerHTML = buildHomePage(id);
  document.getElementById('content-area').appendChild(page);
  if (id === activeTabId) page.classList.add('active');
  return page;
}

function buildHomePage(id) {

      <div class="logo-sub">private · fast · unrestricted</div>
    </div>
    <div class="home-search-wrap">
      <input class="home-search" type="text" placeholder="Search or enter a URL..." autocomplete="off"

      <button class="home-search-go" onclick="homeSearch(${id},this.previousElementSibling.value)">

      <div class="quick-link" onclick="navigateTab(${id},'https://github.com')"><div class="quick-link-icon">💻</div><span>GitHub</span></div>
      <div class="quick-link" onclick="navigateTab(${id},'https://reddit.com')"><div class="quick-link-icon">🤖</div><span>Reddit</span></div>
      <div class="quick-link" onclick="navigateTab(${id},'https://youtube.com')"><div class="quick-link-icon">▶️</div><span>YouTube</span></div>
      <div class="quick-link" onclick="navigateTab(${id},'https://news.ycombinator.com')"><div class="quick-link-icon">🔥</div><span>HN</span></div>

function homeSearch(tabId, value) {
  if (!value.trim()) return;
  const url = document.getElementById('url-input');
  url.value = value;
  navigate(value);
}

// ── Search ─────────────────────────────────────────────────
function doSearch(q) {
  const tab = getActiveTab();
  if (!tab) return;
  tab.type = 'search';
  tab.url = '?q=' + encodeURIComponent(q);
  tab.title = q;

  document.getElementById('url-input').value = q;
  updateTabEl(tab.id, { title: q, favicon: '🔍' });

  let page = document.getElementById('page-'+tab.id);
  if (!page) page = createTabPage(tab.id);

  // Clear page and show results container
  page.innerHTML = `
    <div class="results-page visible" id="results-${tab.id}">
      <div class="results-body">
        <div id="results-meta-${tab.id}" class="results-meta"></div>
        <div class="search-spinner" id="spinner-${tab.id}" style="display:block"></div>
        <div id="results-list-${tab.id}"></div>
      </div>
    </div>`;

  startProgress();

  fetch(`/search?q=${encodeURIComponent(q)}`)
    .then(r => r.json())
    .then(data => {
      endProgress();
      const list = document.getElementById('results-list-'+tab.id);
      const meta = document.getElementById('results-meta-'+tab.id);
      const spinner = document.getElementById('spinner-'+tab.id);
      if (spinner) spinner.style.display = 'none';
      if (!data.results || !data.results.length) {
        list.innerHTML = `<p style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px">No results for "<strong style="color:var(--text)">${esc(q)}</strong>".</p>`;
        return;
      }
      meta.textContent = `≈ ${data.results.length} results`;
      data.results.forEach((item, i) => {
        let domain = '';
        try { domain = new URL(item.url).hostname; } catch {}
        const card = document.createElement('div');
        card.className = 'result-card';
        card.style.animationDelay = (i*0.04)+'s';
        card.innerHTML = `
          <div class="result-domain">🔒 ${esc(domain)}</div>
          <div class="result-title">${esc(item.title)}</div>
          <div class="result-snippet">${esc(item.snippet)}</div>`;
        card.onclick = () => navigateTab(tab.id, item.url);
        list.appendChild(card);
      });
    })
    .catch(err => {
      endProgress();
      const list = document.getElementById('results-list-'+tab.id);
      if (list) list.innerHTML = `<p style="color:var(--accent);font-size:13px">Error: ${esc(err.message)}</p>`;
    });
}

function luckySearch(tabId) {
  const q = document.querySelector(`#home-${tabId} .home-search`)?.value?.trim();
  if (!q) return;
  fetch(`/search?q=${encodeURIComponent(q)}`)
    .then(r=>r.json())
    .then(data => {
      if (data.results?.length) navigateTab(tabId, data.results[0].url);
    });
}

// ── Proxy page ─────────────────────────────────────────────
function showProxyPage(tabId, url) {
  const tab = tabs.find(t=>t.id===tabId);
  let page = document.getElementById('page-'+tabId);
  if (!page) page = createTabPage(tabId);

  startProgress();

  page.innerHTML = `
    <div class="proxy-page visible" id="proxy-${tabId}" style="position:relative">
      <div class="proxy-loading visible" id="loading-${tabId}">
        <div class="load-spinner"></div>
        <div class="load-url">${esc(url)}</div>
      </div>
      <div class="proxy-frame-wrap">
        <iframe class="proxy-frame" id="frame-${tabId}"
          src="/proxy?url=${encodeURIComponent(url)}"

          onload="onFrameLoad(${tabId})"
          onerror="onFrameError(${tabId})">
        </iframe>
      </div>
    </div>`;
}

function onFrameLoad(tabId) {
  endProgress();
  const loading = document.getElementById('loading-'+tabId);
  if (loading) loading.classList.remove('visible');

  // Try to get title from iframe
  try {
    const frame = document.getElementById('frame-'+tabId);
    const title = frame.contentDocument?.title || '';
    if (title) {
      const tab = tabs.find(t=>t.id===tabId);
      if (tab) {
        tab.title = title.slice(0, 40);
        updateTabEl(tabId, { title: tab.title });
        addToHistory(tab.url, tab.title);
      }
    }
  } catch {}

  if (tabId === activeTabId) syncNavBar();
}

function onFrameError(tabId) {
  endProgress();
  const loading = document.getElementById('loading-'+tabId);
  if (loading) loading.classList.remove('visible');
}

// ── Back / Forward ─────────────────────────────────────────
function goBack() {
  const tab = getActiveTab();
  if (!tab || tab.historyIdx <= 0) return;
  tab.historyIdx--;
  const url = tab.history[tab.historyIdx];
  tab.url = url;
  showProxyPage(tab.id, url);
  syncNavBar();
}

function goFwd() {
  const tab = getActiveTab();
  if (!tab || tab.historyIdx >= tab.history.length-1) return;
  tab.historyIdx++;
  const url = tab.history[tab.historyIdx];
  tab.url = url;
  showProxyPage(tab.id, url);
  syncNavBar();
}

function reloadTab() {
  const tab = getActiveTab();
  if (!tab || !tab.url || tab.type === 'home') return;
  if (tab.type === 'search') {
    const q = new URLSearchParams(tab.url.slice(1)).get('q');
    if (q) doSearch(q);
  } else {
    showProxyPage(tab.id, tab.url);
  }
}

function goHome() {
  const tab = getActiveTab();
  if (!tab) return;
  tab.type = 'home';
  tab.url = '';
  tab.title = 'New Tab';
  let page = document.getElementById('page-'+tab.id);
  if (!page) page = createTabPage(tab.id);
  page.innerHTML = buildHomePage(tab.id);
  updateTabEl(tab.id, { title: 'New Tab', favicon: '🔍' });
  document.getElementById('url-input').value = '';
  syncNavBar();
}

// ── Bookmarks ──────────────────────────────────────────────
function getBookmarks() {
  try { return JSON.parse(localStorage.getItem('mp_bookmarks') || '[]'); } catch { return []; }
}
function saveBookmarks(bms) { localStorage.setItem('mp_bookmarks', JSON.stringify(bms)); }

function toggleBookmark() {
  const tab = getActiveTab();
  if (!tab || !tab.url) return;
  let bms = getBookmarks();
  const existing = bms.findIndex(b => b.url === tab.url);
  if (existing >= 0) {
    bms.splice(existing, 1);
  } else {
    bms.unshift({ url: tab.url, title: tab.title || tab.url, favicon: tab.favicon || '🔍' });
  }
  saveBookmarks(bms);
  renderBookmarks();
  syncNavBar();
}

function renderBookmarks() {
  const list = document.getElementById('bookmarks-list');
  const bms = getBookmarks();
  if (!bms.length) {
    list.innerHTML = '<div class="empty-state">No bookmarks yet.<br>Click ☆ to save a page.</div>';
    return;
  }
  list.innerHTML = bms.map((b, i) => `
    <div class="bookmark-item">
      <span class="bm-icon">${b.favicon || '🔍'}</span>
      <span class="bm-title" onclick="navigateBookmark('${esc(b.url)}')">${esc(b.title)}</span>
      <span class="bm-del" onclick="deleteBookmark(${i})">✕</span>
    </div>`).join('');
}

function navigateBookmark(url) {
  toggleBookmarks();
  const tab = getActiveTab();
  if (tab) navigateTab(tab.id, url);
}

function deleteBookmark(i) {
  const bms = getBookmarks();
  bms.splice(i, 1);
  saveBookmarks(bms);
  renderBookmarks();
  syncNavBar();
}

function toggleBookmarks() {
  document.getElementById('bookmarks-panel').classList.toggle('open');
  renderBookmarks();
}

// ── History ────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(sessionStorage.getItem('mp_history') || '[]'); } catch { return []; }
}
function addToHistory(url, title) {
  if (!url) return;
  let hist = getHistory();
  hist = hist.filter(h => h.url !== url);
  hist.unshift({ url, title: title || url, time: Date.now() });
  hist = hist.slice(0, 100);
  sessionStorage.setItem('mp_history', JSON.stringify(hist));
}
function renderHistory() {
  const list = document.getElementById('history-list');
  const hist = getHistory();
  if (!hist.length) {
    list.innerHTML = '<div class="empty-state">No history yet.</div>';
    return;
  }
  list.innerHTML = hist.map(h => `
    <div class="bookmark-item">
      <span class="bm-icon">🕐</span>
      <span class="bm-title" onclick="navigateHistory('${esc(h.url)}')">${esc(h.title || h.url)}</span>
    </div>`).join('');
}
function navigateHistory(url) {
  toggleHistory();
  const tab = getActiveTab();
  if (tab) navigateTab(tab.id, url);
}
function toggleHistory() {
  document.getElementById('history-panel').classList.toggle('open');
  renderHistory();
}

// ── Progress bar ───────────────────────────────────────────
function startProgress() {
  const p = document.getElementById('progress');
  p.className = 'loading';
}
function endProgress() {
  const p = document.getElementById('progress');
  p.className = 'done';
  setTimeout(() => p.className = '', 600);
}

// ── Tab helpers ────────────────────────────────────────────
function updateTabEl(id, { title, favicon }) {
  const tab = tabs.find(t=>t.id===id);
  if (!tab) return;
  if (title !== undefined) tab.title = title;
  if (favicon !== undefined) tab.favicon = favicon;
  const el = document.getElementById('tab-el-'+id);
  if (el) {
    if (title) el.querySelector('.tab-title').textContent = title.slice(0, 30);
    if (favicon) el.querySelector('.tab-favicon').textContent = favicon;
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── postMessage listener (iframe → parent navigation) ──────
window.addEventListener('message', function(e) {
  const data = e.data;
  if (!data || typeof data !== 'object') return;

  if (data.type === 'MP_NAV' && data.url) {
    // Find which tab owns this iframe
    const frame = [...document.querySelectorAll('.proxy-frame')]
      .find(f => f.contentWindow === e.source);
    if (frame) {
      const tabId = parseInt(frame.id.replace('frame-', ''));
      if (!isNaN(tabId)) {
        navigateTab(tabId, data.url);
        return;
      }
    }
    // Fallback: navigate active tab
    const tab = getActiveTab();
    if (tab) navigateTab(tab.id, data.url);
  }

  if (data.type === 'MP_TITLE' && data.title) {
    const frame = [...document.querySelectorAll('.proxy-frame')]
      .find(f => f.contentWindow === e.source);
    if (frame) {
      const tabId = parseInt(frame.id.replace('frame-', ''));
      if (!isNaN(tabId)) {
        updateTabEl(tabId, { title: data.title.slice(0, 40) });
        const tab = tabs.find(t => t.id === tabId);
        if (tab) {
          tab.title = data.title.slice(0, 40);
          if (data.url) addToHistory(tab.url, tab.title);
        }
      }
    }
  }
});

// ── Init ───────────────────────────────────────────────────
newTab();
</script>
